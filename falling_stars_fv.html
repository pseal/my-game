<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Catch the Stars</title>
<style>
  body {
    margin: 0;
    overflow: hidden;
    background: linear-gradient(#001d3d, #003566);
    font-family: Arial, sans-serif;
    color: white;
  }

  #ui {
    position: absolute;
    top: 10px;
    left: 10px;
    font-size: 18px;
    display: none;
  }

  #startScreen, #gameOver {
    position: absolute;
    width: 100%;
    height: 100%;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    background: rgba(0,0,0,0.6);
    text-align: center;
  }

  #gameOver {
    display: none;
  }

  button {
    padding: 10px 20px;
    margin-top: 15px;
    font-size: 18px;
    border-radius: 10px;
    border: none;
    cursor: pointer;
  }

  canvas {
    display: block;
  }
</style>
</head>
<body>

<!-- Start Screen -->
<div id="startScreen">
  <h1>⭐ Catch the Stars ⭐</h1>
  <button onclick="startGame()">Play</button>
</div>

<!-- UI -->
<div id="ui">
  Score: <span id="score">0</span><br>
  Level: <span id="level">1</span><br>
  Lives: <span id="lives">❤️❤️❤️</span>
</div>

<!-- Game Over -->
<div id="gameOver">
  <h2>💥 Game Over</h2>
  <button onclick="restartGame()">Play Again</button>
</div>

<canvas id="gameCanvas"></canvas>

<script>
const canvas = document.getElementById("gameCanvas");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

// Player
let player = {
  x: canvas.width / 2,
  y: canvas.height - 60,
  size: 40
};

let objects = [];
let score = 0;
let level = 1;
let lives = 3;
let gameRunning = false;

// Mouse movement
document.addEventListener("mousemove", (e) => {
  player.x = e.clientX;
});

// Start Game
function startGame() {
  document.getElementById("startScreen").style.display = "none";
  document.getElementById("gameOver").style.display = "none";
  document.getElementById("ui").style.display = "block";

  score = 0;
  level = 1;
  lives = 3;
  objects = [];
  gameRunning = true;

  updateLivesUI();
  document.getElementById("score").innerText = score;
  document.getElementById("level").innerText = level;

  update(); // start loop
}

// Restart Game
function restartGame() {
  document.getElementById("gameOver").style.display = "none";
  document.getElementById("startScreen").style.display = "flex";
  document.getElementById("ui").style.display = "none";
}

// Create objects
function createObject() {
  const isBad = Math.random() < 0.2;

  objects.push({
    x: Math.random() * canvas.width,
    y: 0,
    speed: 2 + Math.random() * level,
    type: isBad ? "bomb" : "star",
    color: `hsl(${Math.random()*360}, 80%, 60%)`
  });
}

// Draw star
function drawStar(x, y, spikes, outerRadius, innerRadius, color) {
  let rot = Math.PI / 2 * 3;
  let step = Math.PI / spikes;

  ctx.beginPath();
  ctx.moveTo(x, y - outerRadius);

  for (let i = 0; i < spikes; i++) {
    let x1 = x + Math.cos(rot) * outerRadius;
    let y1 = y + Math.sin(rot) * outerRadius;
    ctx.lineTo(x1, y1);
    rot += step;

    x1 = x + Math.cos(rot) * innerRadius;
    y1 = y + Math.sin(rot) * innerRadius;
    ctx.lineTo(x1, y1);
    rot += step;
  }

  ctx.closePath();
  ctx.fillStyle = color;
  ctx.fill();
}

// Draw player
function drawPlayer() {
  ctx.font = "40px Arial";
  ctx.fillText("🧒", player.x - 20, player.y);
}

// Draw objects (fixed loop)
function drawObjects() {
  for (let i = objects.length - 1; i >= 0; i--) {
    let obj = objects[i];

    obj.y += obj.speed;

    if (obj.type === "star") {
      drawStar(obj.x, obj.y, 5, 15, 7, obj.color);
    } else {
      ctx.font = "25px Arial";
      ctx.fillText("💣", obj.x - 10, obj.y);
    }

    // Collision
    if (
      obj.y > player.y - 20 &&
      obj.x > player.x - 20 &&
      obj.x < player.x + 20
    ) {
      if (obj.type === "star") {
        score++;
        document.getElementById("score").innerText = score;

        if (score % 10 === 0) {
          level++;
          document.getElementById("level").innerText = level;
        }
      } else {
        lives--;
        updateLivesUI();

        if (lives <= 0) {
          endGame();
        }
      }

      objects.splice(i, 1);
      continue;
    }

    if (obj.y > canvas.height) {
      objects.splice(i, 1);
    }
  }
}

// Game loop
function update() {
  if (!gameRunning) return;

  ctx.clearRect(0, 0, canvas.width, canvas.height);

  drawPlayer();
  drawObjects();

  requestAnimationFrame(update);
}

// End game
function endGame() {
  gameRunning = false;
  document.getElementById("gameOver").style.display = "flex";
}

// Lives UI
function updateLivesUI() {
  document.getElementById("lives").innerText = "❤️".repeat(lives);
}

// Spawn objects
setInterval(() => {
  if (gameRunning) createObject();
}, 800);
</script>

</body>
</html>
