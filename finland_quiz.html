function shuffle(a){
for(let i=a.length-1;i>0;i--){
let j=Math.floor(Math.random()*(i+1));
[a[i],a[j]]=[a[j],a[i]];
}
}

function getRandom(arr,n){
let c=[...arr];
shuffle(c);
return c.slice(0,n);
}

let qset=getRandom(quiz,10);
let current=0;
let score=0;
let answers=[];

function load(){
let q=qset[current];
document.getElementById('question').innerText=q.question;
let div=document.getElementById('answers');
div.innerHTML='';
let opts=[...q.answers];
shuffle(opts);
opts.forEach(o=>{
let b=document.createElement('button');
b.innerText=o;
b.onclick=()=>check(o);
div.appendChild(b);
});
}

function check(sel){
let q=qset[current];
let correct=q.answers[q.correct];
answers.push({q:q.question,sel:sel,cor:correct,ok:sel===correct});
if(sel===correct)score++;
current++;
if(current<qset.length)load();
else end();
}

function end(){
let html=`<h2>Done!</h2><p>${score}/${qset.length}</p>`;
answers.forEach(a=>{
html+=`<div style='text-align:left'>
<b>${a.q}</b><br>
Your: <span class='${a.ok?'correct':'wrong'}'>${a.sel}</span><br>
Correct: ${a.cor}
</div>`;
});
document.querySelector('.quiz-box').innerHTML=html;
}

load();
